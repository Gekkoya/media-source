name: Dead source report
description: Report a source that is permanently down or closed
labels: [Source is down]
body:
  - type: input
    id: source
    attributes:
      label: Source name
      placeholder: Example: Not Real Source
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Source URL
      placeholder: Example: https://example.org
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      placeholder: Add evidence that the website is permanently down or closed.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I checked the website in a browser or WebView.
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This appears permanent, not temporary downtime.
          required: true
