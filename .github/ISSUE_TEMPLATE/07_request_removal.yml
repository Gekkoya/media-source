name: Source removal request
description: Request removal of a source
labels: [Meta request]
body:
  - type: input
    id: link
    attributes:
      label: Source URL
      placeholder: Example: https://example.org
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Removal reason
      placeholder: Explain why this source should be removed.
    validations:
      required: true

  - type: checkboxes
    id: requirements
    attributes:
      label: Requirements
      options:
        - label: I provided enough proof or context for the removal request.
          required: true
        - label: I understand this request may be denied if the source is still supportable.
          required: true
