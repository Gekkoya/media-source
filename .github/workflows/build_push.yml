name: Build and publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:
    inputs:
      build_all:
        description: Build every extension module
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 15
  IS_PR_CHECK: false

jobs:
  quality:
    name: Format, build-logic and core tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: on-failure

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run checks
        run: ./gradlew spotlessCheck :core:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: push-quality-reports
          path: '**/build/reports/'
          if-no-files-found: ignore
          retention-days: 7

  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      delete: ${{ steps.matrix.outputs.delete }}
      has_modules: ${{ steps.matrix.outputs.has_modules }}
      latest_commit_message: ${{ steps.commit.outputs.message }}
      publish_repo: ${{ steps.publish.outputs.enabled }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: commit
        name: Capture commit message
        run: |
          {
            echo 'message<<EOF'
            git log -1 --pretty=%B
            echo
            echo "Built on commit: $(git log -1 --pretty=%H)"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Bump extensions affected by lib changes
        if: github.event_name == 'push'
        run: |
          before='${{ github.event.before }}'
          if [ -z "$before" ] || [ "$before" = '0000000000000000000000000000000000000000' ]; then
            echo "Version bump skipped: no previous commit is available."
            exit 0
          fi
          changed_libs=$(git diff --name-only "$before" HEAD -- 'lib/**' ':!lib/**.md' || true)
          if [ -n "$changed_libs" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            python ./.github/scripts/bump-versions.py "${{ steps.commit.outputs.message }}" $changed_libs
            git push
          else
            echo "No lib changes detected."
          fi

      - id: matrix
        name: Generate build matrix
        run: |
          before='${{ github.event.before }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -z "$before" ] || [ "$before" = '0000000000000000000000000000000000000000' ]; then
            ref=ALL
          else
            ref="$before"
          fi
          python ./.github/scripts/generate-build-matrices.py "$ref" Release

      - id: publish
        name: Detect publish configuration
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          REPO: ${{ vars.GEKKOYA_REPO_REPOSITORY }}
        run: |
          if [ -n "$BOT_PAT" ] && [ -n "$REPO" ]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: [quality, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: needs.prepare.outputs.has_modules == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ matrix.chunk.number > 1 }}
          add-job-summary: on-failure

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare signing key
        if: env.SIGNING_KEY != ''
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          printf '%s' "$SIGNING_KEY" | base64 -d > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build extensions
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          MEGACLOUD_API: ${{ secrets.MEGACLOUD_API }}
          KISSKH_API: ${{ secrets.KISSKH_API }}
          KISSKH_SUB_API: ${{ secrets.KISSKH_SUB_API }}
          KAISVA: ${{ secrets.KAISVA }}
          TMDB_API: ${{ secrets.TMDB_API }}
        run: ./gradlew $MODULES --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apks-${{ matrix.chunk.number }}
          path: '**/*.apk'
          if-no-files-found: error
          retention-days: 3

      - name: Remove signing key
        if: always()
        run: rm -f signingkey.jks

  publish:
    name: Publish extension repository
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.build.result == 'success' && needs.prepare.outputs.has_modules == 'true' && needs.prepare.outputs.publish_repo == 'true'
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-apks-*
          path: ~/apk-artifacts

      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          path: source
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Create repo artifacts
        env:
          SYMERA_REPO_NAME: Symera Media Extensions
          SYMERA_REPO_SHORT_NAME: Symera
          SYMERA_REPO_WEBSITE: https://github.com/${{ vars.GEKKOYA_REPO_REPOSITORY }}
        run: |
          cd source
          python ./.github/scripts/move-built-apks.py
          python ./.github/scripts/create-repo.py

      - name: Checkout repo branch
        uses: actions/checkout@v7
        with:
          repository: ${{ vars.GEKKOYA_REPO_REPOSITORY }}
          token: ${{ secrets.BOT_PAT }}
          ref: ${{ vars.GEKKOYA_REPO_BRANCH || 'repo' }}
          path: repo
          fetch-depth: 0

      - name: Merge repo output
        env:
          DELETE: ${{ needs.prepare.outputs.delete }}
        run: |
          cd repo
          python ../source/.github/scripts/merge-repo.py "$DELETE" source/repo

      - name: Deploy repo branch
        uses: EndBug/add-and-commit@v10
        with:
          cwd: repo
          message: ${{ needs.prepare.outputs.latest_commit_message }}
