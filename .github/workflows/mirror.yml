name: Mirror repository

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror
        env:
          CODEBERG_REPOSITORY: ${{ vars.CODEBERG_REPOSITORY }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          if [ -z "$CODEBERG_REPOSITORY" ] || [ -z "$CODEBERG_TOKEN" ]; then
            echo "Mirror skipped: CODEBERG_REPOSITORY variable or CODEBERG_TOKEN secret is missing."
            exit 0
          fi
          git remote add codeberg "https://x-access-token:${CODEBERG_TOKEN}@codeberg.org/${CODEBERG_REPOSITORY}.git"
          git push --mirror codeberg
